name: Run Tests

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    tests:
        name: tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  coverage: none

            - name: Install composer dependencies
              uses: ramsey/composer-install@v2

            - name: Run Tests
              run: ./vendor/bin/phpunit
